<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rubato Woodcrafts — Mockup 2: Masonry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.6;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            border-bottom: 1px solid #111;
        }

        header img {
            max-width: 300px;
            width: 100%;
            height: auto;
        }

        header .tagline {
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #666;
        }

        .quote {
            max-width: 1100px;
            margin: 2.5rem auto 0;
            padding: 0 1.5rem;
            font-style: italic;
            font-size: 0.95rem;
            color: #555;
        }

        .quote cite {
            font-style: normal;
            color: #999;
            font-size: 0.85rem;
        }

        .gallery {
            max-width: 1100px;
            margin: 2.5rem auto 4rem;
            padding: 0 1.5rem;
            columns: 3;
            column-gap: 1.25rem;
        }

        .gallery a {
            display: block;
            margin-bottom: 1.25rem;
            break-inside: avoid;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
        }

        .gallery a:hover img {
            opacity: 0.85;
        }

        footer {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
            border-top: 1px solid #111;
            font-size: 0.9rem;
            color: #444;
        }

        @media (max-width: 900px) {
            .gallery { columns: 2; }
        }

        @media (max-width: 560px) {
            .gallery { columns: 1; }
            header { justify-content: center; text-align: center; }
        }
    </style>
</head>
<body>
    <header>
        <img src="../logo-header.png" alt="Rubato Woodcrafts">
        <span class="tagline">Handmade &middot; Bainbridge Island, WA</span>
    </header>

    <p class="quote">
        &ldquo;Tempo rubato means literally in robbed time, i.e., duration taken from one measure or beat and given to another&rdquo;
        &mdash; <cite>Karl Wilson Gehrkens</cite>
    </p>

    <div class="gallery">
        <a href="../gallery/IMG_9286.jpeg"><img src="../gallery/IMG_9286.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_0055.jpeg"><img src="../gallery/IMG_0055.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_5616.jpeg"><img src="../gallery/IMG_5616.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_0682.jpeg"><img src="../gallery/IMG_0682.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_5694.jpeg"><img src="../gallery/IMG_5694.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_6126.jpeg"><img src="../gallery/IMG_6126.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_6322.jpeg"><img src="../gallery/IMG_6322.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_6520.jpeg"><img src="../gallery/IMG_6520.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_8210.jpeg"><img src="../gallery/IMG_8210.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_9890.jpeg"><img src="../gallery/IMG_9890.jpeg" alt="Woodcraft piece"></a>
    </div>

    <footer>
        Rubato Woodcrafts is located on Bainbridge Island, Washington.
    </footer>
</body>
</html>
