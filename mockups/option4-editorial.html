<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rubato Woodcrafts — Mockup 4: Editorial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #fff;
            color: #1a1a1a;
            line-height: 1.7;
        }

        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header img {
            max-width: 380px;
            width: 100%;
            height: auto;
        }

        .quote {
            text-align: center;
            font-style: italic;
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 4rem;
        }

        .quote cite {
            display: block;
            margin-top: 0.5rem;
            font-style: normal;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999;
        }

        .gallery a {
            display: block;
            margin-bottom: 3.5rem;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
        }

        .gallery a:hover img {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            border-top: 1px solid #1a1a1a;
            padding-top: 2.5rem;
            font-size: 0.95rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="page">
        <header>
            <img src="../logo-header.png" alt="Rubato Woodcrafts">
        </header>

        <p class="quote">
            &ldquo;Tempo rubato means literally in robbed time, i.e., duration taken from one measure or beat and given to another&rdquo;
            <cite>Karl Wilson Gehrkens</cite>
        </p>

        <div class="gallery">
            <a href="../gallery/IMG_9286.jpeg"><img src="../gallery/IMG_9286.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_0055.jpeg"><img src="../gallery/IMG_0055.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_5616.jpeg"><img src="../gallery/IMG_5616.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_0682.jpeg"><img src="../gallery/IMG_0682.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_5694.jpeg"><img src="../gallery/IMG_5694.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_6126.jpeg"><img src="../gallery/IMG_6126.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_6322.jpeg"><img src="../gallery/IMG_6322.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_6520.jpeg"><img src="../gallery/IMG_6520.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_8210.jpeg"><img src="../gallery/IMG_8210.jpeg" alt="Woodcraft piece"></a>
            <a href="../gallery/IMG_9890.jpeg"><img src="../gallery/IMG_9890.jpeg" alt="Woodcraft piece"></a>
        </div>

        <footer>
            Rubato Woodcrafts is located on Bainbridge Island, Washington.
        </footer>
    </div>
</body>
</html>
