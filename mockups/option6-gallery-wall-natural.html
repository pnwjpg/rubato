<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rubato Woodcrafts — Mockup 6: Gallery Wall, Natural Proportions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fff;
            color: #111;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2.5rem;
        }

        header img {
            max-width: 420px;
            width: 100%;
            height: auto;
        }

        .rule {
            width: 48px;
            height: 1px;
            background: #111;
            margin: 2.5rem auto;
            border: none;
        }

        .quote {
            max-width: 560px;
            margin: 0 auto;
            padding: 0 1.5rem;
            text-align: center;
            font-style: italic;
            font-size: 0.95rem;
            color: #555;
        }

        .quote cite {
            display: block;
            margin-top: 0.75rem;
            font-style: normal;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #999;
        }

        .gallery {
            max-width: 1080px;
            margin: 4rem auto;
            padding: 0 1.5rem;
            columns: 3;
            column-gap: 1.5rem;
        }

        .gallery a {
            display: block;
            margin-bottom: 1.5rem;
            break-inside: avoid;
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.2s ease;
        }

        .gallery a:hover img {
            opacity: 0.85;
        }

        footer {
            text-align: center;
            padding: 3rem 1.5rem 4rem;
            font-size: 0.9rem;
            letter-spacing: 0.08em;
            color: #444;
        }

        @media (max-width: 900px) {
            .gallery { columns: 2; }
        }

        @media (max-width: 560px) {
            .gallery { columns: 1; }
        }
    </style>
</head>
<body>
    <header>
        <img src="../logo-header.png" alt="Rubato Woodcrafts">
    </header>

    <p class="quote">
        Tempo rubato means literally in robbed time, i.e., duration taken from one measure or beat and given to another
        <cite>Karl Wilson Gehrkens</cite>
    </p>

    <hr class="rule">

    <div class="gallery">
        <a href="../gallery/IMG_9286.jpeg"><img src="../gallery/IMG_9286.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_0055.jpeg"><img src="../gallery/IMG_0055.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_5616.jpeg"><img src="../gallery/IMG_5616.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_0682.jpeg"><img src="../gallery/IMG_0682.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_5694.jpeg"><img src="../gallery/IMG_5694.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_6126.jpeg"><img src="../gallery/IMG_6126.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_6322.jpeg"><img src="../gallery/IMG_6322.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_6520.jpeg"><img src="../gallery/IMG_6520.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_8210.jpeg"><img src="../gallery/IMG_8210.jpeg" alt="Woodcraft piece"></a>
        <a href="../gallery/IMG_9890.jpeg"><img src="../gallery/IMG_9890.jpeg" alt="Woodcraft piece"></a>
    </div>

    <hr class="rule">

    <footer>
        Rubato Woodcrafts is located on Bainbridge Island, Washington.
    </footer>
</body>
</html>
